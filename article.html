    <style>
      :root {
        --gold:  #987B43;
        --gold2: #c4a96e;
        --gold3: #6b5530;
        --goldL: #e8d5a3;
        --black: #000;
        --dark:  #0d0d0d;
        --dark2: #141414;
        --dark3: #1a1a1a;
        --text:  #e8e4dd;
        --muted: #888;
      }

      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
      html { scroll-behavior:smooth; overflow-x:hidden; }
      body {
        font-family: 'Tajawal', sans-serif;
        background: var(--black);
        color: var(--text);
        overflow-x: hidden;
        direction: rtl;
      }
      a { text-decoration:none; color:inherit; }
      img { max-width:100%; display:block; }
      ::-webkit-scrollbar { width:3px; }
      ::-webkit-scrollbar-track { background:var(--dark); }
      ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }

      /* ───── NAV ───── */
      nav {
        position: fixed;
        top:0; left:0; right:0;
        z-index: 1000;
        padding: 0 48px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(0,0,0,.88);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(152,123,67,.2);
      }

      .nav-logo { display:flex; align-items:center; gap:12px; }
      .nav-logo img { height:46px; object-fit:contain; }
      .nav-logo-text { display:flex; flex-direction:column; line-height:1.2; }
      .nav-logo-text span:first-child { font-size:.7rem; color:var(--gold2); letter-spacing:1px; }
      .nav-logo-text span:last-child  { font-size:.95rem; font-weight:700; }

      .nav-back {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--gold2);
        font-size: .77rem;
        font-weight: 500;
        border: 1px solid rgba(152,123,67,.35);
        padding: 8px 20px;
        border-radius: 30px;
        transition: all .3s;
      }
      .nav-back:hover {
        background: rgba(152,123,67,.12);
        border-color: var(--gold2);
        color: #fff;
      }

      /* ───── HERO ───── */
      .art-hero {
        padding-top: 80px;
        min-height: 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .art-hero-bg {
        position: absolute; inset: 0;
        background:
          radial-gradient(ellipse 80% 120% at 50% 100%, rgba(152,123,67,.14) 0%, transparent 65%),
          linear-gradient(180deg, #060606 0%, #000 100%);
      }

      .art-hero-ornament {
        position: absolute;
        width: 500px; height: 500px;
        border-radius: 50%;
        border: 1px solid rgba(152,123,67,.06);
        top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        pointer-events: none;
      }
      .art-hero-ornament::before {
        content: '';
        position: absolute; inset: 30px;
        border-radius: 50%;
        border: 1px solid rgba(152,123,67,.04);
      }

      .art-hero-content { position: relative; z-index: 1; padding: 0 20px; }

      .art-hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(152,123,67,.1);
        border: 1px solid rgba(152,123,67,.3);
        border-radius: 30px;
        padding: 5px 18px;
        font-size: .75rem;
        color: var(--gold2);
        letter-spacing: 2px;
        margin-bottom: 16px;
      }
      .art-hero-tag::before, .art-hero-tag::after {
        content: '';
        width: 18px; height: 1px;
        background: var(--gold3);
      }

      .art-hero-title {
        font-family: 'Alexandria', sans-serif;
        font-size: clamp(1.6rem, 4vw, 2.8rem);
        font-weight: 800;
        background: linear-gradient(135deg, var(--gold3) 0%, var(--goldL) 40%, var(--gold2) 70%, var(--gold3) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: .5px;
        max-width: 860px;
        margin: 0 auto;
      }

      .art-hero-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 14px;
      }
      .art-hero-divider::before, .art-hero-divider::after {
        content: '';
        width: 40px; height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold3));
      }
      .art-hero-divider::after { transform: scaleX(-1); }

      /* ───── ARTICLE BODY ───── */
      .art-body-section {
        padding: 60px 24px 100px;
      }

      .art-body-inner {
        max-width: 860px;
        margin: 0 auto;
      }

        align-items: center;
        gap: 10px;

        background: linear-gradient(180deg, var(--gold), var(--gold3));
        border-radius: 2px;
        flex-shrink: 0;
      }
      #article-content h3 {
        font-family: 'Alexandria', sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--gold2);
        margin: 1.6em 0 .6em;
      }
      #article-content p {
        font-size: 1.05rem;
        line-height: 2;
        color: #ccc5b9;
        margin-bottom: 1.3em;
      }
      #article-content ul {
        list-style: none;
        padding: 0;
        margin: .5em 0 1.5em;
      }

        border-bottom: 1px solid rgba(152,123,67,.08);

        align-items: flex-start;
        gap: 10px;
      }
      #article-content ul li::before {
        content: '◆';
        color: var(--gold);
        font-size: .55rem;
        margin-top: .6em;
        flex-shrink: 0;
      }
      #article-content strong {
        color: var(--gold2);
        font-weight: 600;
      }

      /* Not found state */
      .art-not-found {
        text-align: center;
        padding: 80px 20px;
        color: var(--muted);

      .art-not-found h2 { font-size: 2rem; margin-bottom: 16px; color: var(--gold); }
      .art-not-found a { color: var(--gold2); border-bottom: 1px solid var(--gold3); }

      /* ───── SIDE BUTTONS ───── */
      .side-btns {
        position: fixed;
        left: 0; top: 50%;
        transform: translateY(-50%);
        z-index: 900;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .side-expand {
        display: flex;
        align-items: center;
        gap: 0;
        overflow: hidden;
        width: 46px;
        height: 46px;
        border-radius: 0 26px 26px 0;
        background: rgba(15,15,15,.9);
        border: 1px solid rgba(152,123,67,.25);
        border-right: none;
        cursor: pointer;
        transition: width .35s cubic-bezier(.4,0,.2,1), background .3s, border-color .3s;
        text-decoration: none;
        color: var(--text);
      }
      .side-expand:hover {
        width: 140px;
        background: rgba(30,30,30,.97);
        border-color: var(--gold2);
      }
      .side-icon {
        width: 44px; height: 44px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        font-size: 1rem;
      }
      .side-gold .side-icon { color: var(--gold2); }
      .side-label, .side-contact-label {
        font-size: .75rem;
        white-space: nowrap;
        opacity: 0;
        transition: opacity .25s .05s;
        font-weight: 500;
      }
      .side-expand:hover .side-label,
      .side-expand:hover .side-contact-label { opacity: 1; }

      /* ───── FOOTER ───── */
      .footer {
        text-align: center;
        padding: 36px 20px;
        border-top: 1px solid rgba(152,123,67,.12);
        color: var(--muted);
        font-size: .82rem;
      }
      .footer strong { color: var(--gold2); font-weight: 600; }

      /* ───── RESPONSIVE ───── */
      @media (max-width:600px) {
        nav { padding: 0 16px; }
        .art-hero { min-height: 180px; }
        .art-body-section { padding: 40px 16px 80px; }
        #article-content h2 { font-size: 1.15rem; }
        #article-content p { font-size: .97rem; }
      }
    </style>
