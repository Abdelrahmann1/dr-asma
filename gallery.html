<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>معرض الصور – د. أسماء الحداد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Alexandria:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="favicon.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <style>
      :root {
        --gold:  #987B43;
        --gold2: #c4a96e;
        --gold3: #6b5530;
        --goldL: #e8d5a3;
        --black: #000;
        --dark:  #0d0d0d;
        --dark2: #141414;
        --dark3: #1a1a1a;
        --text:  #e8e4dd;
        --muted: #777;
      }

      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
      html { scroll-behavior:smooth; overflow-x:hidden; }
      body {
        font-family:'Tajawal', sans-serif;
        background:var(--black);
        color:var(--text);
        overflow-x:hidden;
        direction:rtl;
      }
      a { text-decoration:none; color:inherit; }
      img { max-width:100%; display:block; }
      ::-webkit-scrollbar { width:3px; }
      ::-webkit-scrollbar-track { background:var(--dark); }
      ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }

      /* ───── NAV ───── */
      nav {
        position: fixed;
        top:0; left:0; right:0;
        z-index: 1000;
        padding: 0 48px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(0,0,0,.88);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(152,123,67,.2);
      }

      .nav-logo { display:flex; align-items:center; gap:12px; }
      .nav-logo img { height:46px; object-fit:contain; }
      .nav-logo-text { display:flex; flex-direction:column; line-height:1.2; }
      .nav-logo-text span:first-child { font-size:.7rem; color:var(--gold2); letter-spacing:1px; }
      .nav-logo-text span:last-child  { font-size:.95rem; font-weight:700; }

      .nav-back {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--gold2);
        font-size: .77rem;
        font-weight: 500;
        border: 1px solid rgba(152,123,67,.35);
        padding: 8px 20px;
        border-radius: 30px;
        transition: all .3s;
      }
      .nav-back:hover {
        background: rgba(152,123,67,.12);
        border-color: var(--gold2);
        color: #fff;
      }

      /* ───── HERO ───── */
      .hero {
        padding-top: 80px;
        height: 260px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .hero-bg {
        position:absolute; inset:0;
        background:
          radial-gradient(ellipse 80% 120% at 50% 100%, rgba(152,123,67,.13) 0%, transparent 65%),
          linear-gradient(180deg, #060606 0%, #000 100%);
      }

      .hero-ornament {
        position:absolute;
        width:500px; height:500px;
        border-radius:50%;
        border:1px solid rgba(152,123,67,.06);
        top:50%; left:50%;
        transform:translate(-50%,-50%);
        pointer-events:none;
      }
      .hero-ornament::before {
        content:'';
        position:absolute; inset:30px;
        border-radius:50%;
        border:1px solid rgba(152,123,67,.05);
      }

      .hero-content { position:relative; z-index:1; }

      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(152,123,67,.1);
        border: 1px solid rgba(152,123,67,.3);
        border-radius: 30px;
        padding: 5px 18px;
        font-size: .75rem;
        color: var(--gold2);
        letter-spacing: 2px;
        margin-bottom: 18px;
      }
      .hero-tag::before, .hero-tag::after {
        content:'';
        width:20px; height:1px;
        background:var(--gold3);
      }

      .hero h1 {
        font-family: 'Alexandria', sans-serif;
        font-size: clamp(2.2rem, 5vw, 3.8rem);
        font-weight: 800;
        background: linear-gradient(135deg, var(--gold3) 0%, var(--goldL) 40%, var(--gold2) 70%, var(--gold3) 100%);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
        letter-spacing:1px;
      }

      .hero-divider {
        display:flex;
        align-items:center;
        justify-content:center;
        gap:10px;
        margin-top:14px;
      }
      .hero-divider span { color:var(--muted); font-size:.82rem; letter-spacing:3px; }
      .hero-divider::before, .hero-divider::after {
        content:'';
        width:50px; height:1px;
        background:linear-gradient(90deg,transparent,var(--gold3));
      }
      .hero-divider::after { transform:scaleX(-1); }

      /* ───── STATS BAR ───── */
      .stats {
        display:flex;
        justify-content:center;
        gap:0;
        border-top: 1px solid rgba(152,123,67,.15);
        border-bottom: 1px solid rgba(152,123,67,.15);
        background: rgba(10,10,10,.9);
        padding: 18px 0;
      }
      .stat {
        flex:1; max-width:180px;
        text-align:center;
        position:relative;
      }
      .stat + .stat::before {
        content:'';
        position:absolute; right:0; top:50%;
        transform:translateY(-50%);
        height:30px; width:1px;
        background:rgba(152,123,67,.2);
      }
      .stat-num {
        font-family:'Alexandria',sans-serif;
        font-size:1.6rem; font-weight:800;
        color:var(--gold2);
        display:block;
      }
      .stat-label { font-size:.72rem; color:var(--muted); letter-spacing:1px; }

      /* ───── GALLERY ───── */
      .gallery-section {
        padding: 56px 40px 100px;
        max-width: 1440px;
        margin: 0 auto;
      }

      .section-head {
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom:36px;
      }
      .section-title {
        font-size:1.05rem;
        color:var(--gold2);
        font-weight:500;
        display:flex;
        align-items:center;
        gap:10px;
      }
      .section-title::after {
        content:'';
        display:block;
        width:40px; height:1px;
        background:var(--gold3);
      }
      .section-count {
        font-size:.8rem;
        color:var(--muted);
        border:1px solid rgba(152,123,67,.2);
        border-radius:20px;
        padding:4px 14px;
      }
      .section-count span { color:var(--gold2); font-weight:700; }

      /* Masonry */
      .masonry {
        columns: 4;
        column-gap: 12px;
      }
      @media(max-width:1100px){ .masonry{ columns:3; } }
      @media(max-width:700px) { .masonry{ columns:2; } }
      @media(max-width:420px) { .masonry{ columns:1; } }

      .card {
        break-inside:avoid;
        margin-bottom:12px;
        position:relative;
        overflow:hidden;
        border-radius:12px;
        cursor:pointer;
        background:var(--dark2);
        border:1px solid rgba(152,123,67,.08);
        transition: border-color .4s, box-shadow .4s, transform .4s;
      }
      .card:hover {
        border-color:rgba(152,123,67,.4);
        box-shadow:0 8px 40px rgba(152,123,67,.15);
        transform:translateY(-3px);
      }

      .card img {
        width:100%; height:auto;
        display:block;
        transition:transform .6s cubic-bezier(.25,.46,.45,.94);
      }
      .card:hover img { transform:scale(1.07); }

      .card-overlay {
        position:absolute; inset:0;
        background:linear-gradient(
          180deg,
          transparent 45%,
          rgba(0,0,0,.85) 100%
        );
        opacity:0;
        transition:opacity .4s;
        display:flex;
        align-items:flex-end;
        justify-content:center;
        padding-bottom:20px;
      }
      .card:hover .card-overlay { opacity:1; }

      .card-overlay-icon {
        width:44px; height:44px;
        border-radius:50%;
        background:rgba(152,123,67,.85);
        display:flex; align-items:center; justify-content:center;
        transform:translateY(14px);
        transition:transform .35s;
        backdrop-filter:blur(4px);
      }
      .card:hover .card-overlay-icon { transform:translateY(0); }
      .card-overlay-icon i { color:#fff; font-size:.95rem; }

      /* Fade-in animation */
      .card {
        opacity:0;
        transform:translateY(30px);
        animation:fadeUp .5s ease forwards;
      }
      @keyframes fadeUp {
        to { opacity:1; transform:translateY(0); }
      }
      .card:nth-child(1)  { animation-delay:.05s }
      .card:nth-child(2)  { animation-delay:.1s  }
      .card:nth-child(3)  { animation-delay:.15s }
      .card:nth-child(4)  { animation-delay:.2s  }
      .card:nth-child(5)  { animation-delay:.25s }
      .card:nth-child(6)  { animation-delay:.3s  }
      .card:nth-child(7)  { animation-delay:.35s }
      .card:nth-child(8)  { animation-delay:.4s  }
      .card:nth-child(9)  { animation-delay:.45s }
      .card:nth-child(10) { animation-delay:.5s  }
      .card:nth-child(11) { animation-delay:.55s }
      .card:nth-child(12) { animation-delay:.6s  }
      .card:nth-child(13) { animation-delay:.65s }
      .card:nth-child(14) { animation-delay:.7s  }
      .card:nth-child(15) { animation-delay:.75s }
      .card:nth-child(16) { animation-delay:.8s  }
      .card:nth-child(17) { animation-delay:.85s }
      .card:nth-child(18) { animation-delay:.9s  }
      .card:nth-child(19) { animation-delay:.95s }
      .card:nth-child(20) { animation-delay:1s   }
      .card:nth-child(21) { animation-delay:1.05s}

      /* ───── LIGHTBOX ───── */
      .lightbox {
        position:fixed; inset:0; z-index:9999;
        background:rgba(0,0,0,.97);
        display:flex; align-items:center; justify-content:center;
        opacity:0; pointer-events:none;
        transition:opacity .3s;
        backdrop-filter:blur(8px);
        -webkit-backdrop-filter:blur(8px);
      }
      .lightbox.active { opacity:1; pointer-events:all; }

      .lb-wrap {
        position:relative;
        display:flex; align-items:center; justify-content:center;
        max-width:92vw; max-height:90vh;
      }
      .lb-wrap img {
        max-width:88vw; max-height:88vh;
        border-radius:10px;
        object-fit:contain;
        box-shadow:0 0 100px rgba(152,123,67,.2);
        border:1px solid rgba(152,123,67,.2);
        transform:scale(.94);
        transition:transform .4s cubic-bezier(.25,.46,.45,.94);
      }
      .lightbox.active .lb-wrap img { transform:scale(1); }

      .lb-wrap::before {
        content:'';
        position:absolute; inset:-8px;
        border:1px solid rgba(152,123,67,.1);
        border-radius:14px;
        pointer-events:none;
      }

      .lb-btn {
        position:fixed; top:50%; z-index:10000;
        transform:translateY(-50%);
        width:48px; height:48px; border-radius:50%;
        background:rgba(20,20,20,.8);
        border:1px solid rgba(152,123,67,.35);
        display:flex; align-items:center; justify-content:center;
        cursor:pointer;
        transition:all .3s;
        color:#fff; font-size:1rem;
        backdrop-filter:blur(4px);
      }
      .lb-btn:hover {
        background:rgba(152,123,67,.3);
        border-color:var(--gold2);
        transform:translateY(-50%) scale(1.08);
      }
      #lb-prev { right:20px; }
      #lb-next { left:20px;  }

      .lb-close {
        position:fixed; top:20px; left:20px; z-index:10000;
        width:42px; height:42px; border-radius:50%;
        background:rgba(20,20,20,.8);
        border:1px solid rgba(152,123,67,.3);
        display:flex; align-items:center; justify-content:center;
        cursor:pointer;
        transition:all .3s;
        color:#fff; font-size:.9rem;
        backdrop-filter:blur(4px);
      }
      .lb-close:hover { background:rgba(180,40,40,.4); border-color:#c0392b; }

      .lb-footer {
        position:fixed; bottom:24px; left:50%;
        transform:translateX(-50%);
        display:flex; align-items:center; gap:16px;
        z-index:10000;
      }
      .lb-counter {
        color:var(--gold2);
        font-size:.8rem; letter-spacing:3px;
        background:rgba(0,0,0,.6);
        padding:6px 18px; border-radius:20px;
        border:1px solid rgba(152,123,67,.2);
        backdrop-filter:blur(4px);
      }

      .lb-thumbs {
        display:flex; gap:6px; overflow-x:auto; max-width:300px;
        scrollbar-width:none;
      }
      .lb-thumbs::-webkit-scrollbar { display:none; }
      .lb-thumb {
        width:36px; height:36px; border-radius:5px;
        object-fit:cover; flex-shrink:0;
        border:1px solid rgba(152,123,67,.15);
        cursor:pointer; opacity:.5; transition:all .25s;
      }
      .lb-thumb.active, .lb-thumb:hover {
        opacity:1; border-color:var(--gold2);
      }

      /* ───── FOOTER ───── */
      .footer {
        text-align:center;
        padding:36px 20px;
        border-top:1px solid rgba(152,123,67,.12);
        color:var(--muted);
        font-size:.82rem;
      }
      .footer strong { color:var(--gold2); font-weight:600; }

      @media(max-width:600px) {
        nav { padding:0 20px; }
        .gallery-section { padding:40px 16px 80px; }
        .hero { height:200px; }
        .stat-num { font-size:1.3rem; }
      }
    </style>
  </head>
  <body>

    <script>
     const imgs = [
  'assets/gallary/1.jpeg',
  'assets/gallary/2.jpeg',
  'assets/gallary/3.jpg',
  'assets/gallary/4.jpg',
  'assets/gallary/5.jpeg',
  'assets/gallary/6.jpeg',
  'assets/gallary/7.jpeg',
  'assets/gallary/8.jpeg',
  'assets/gallary/9.jpeg',
  'assets/gallary/10.jpeg',
  'assets/gallary/11.jpeg',
  'assets/gallary/12.jpeg',
  'assets/gallary/13.jpeg',
  'assets/gallary/14.jpg',
  'assets/gallary/15.jpg',
  'assets/gallary/16.jpg',
  'assets/gallary/17.jpg',
  'assets/gallary/18.jpeg',
  'assets/gallary/19.jpg',
  'assets/gallary/20.jpg',
  'assets/gallary/21.jpg',
];

      let cur = 0;

      // build thumbnail strip
      const strip = document.getElementById('lb-thumbs');
      imgs.forEach((src, i) => {
        const t = document.createElement('img');
        t.src = src; t.className = 'lb-thumb';
        t.onclick = (e) => { e.stopPropagation(); lb(i); };
        strip.appendChild(t);
      });

      function lb(i) {
        cur = i;
        update();
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeLb() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
      }

      function nav(d) { cur = (cur + d + imgs.length) % imgs.length; update(); }

      function update() {
        document.getElementById('lb-img').src = imgs[cur];
        document.getElementById('lb-counter').textContent = (cur + 1) + ' / ' + imgs.length;
        document.querySelectorAll('.lb-thumb').forEach((t,i) => {
          t.classList.toggle('active', i === cur);
        });
        strip.children[cur]?.scrollIntoView({ inline:'center', behavior:'smooth' });
      }

      document.getElementById('lightbox').addEventListener('click', function(e) {
        if (e.target === this) closeLb();
      });

      document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        if (e.key === 'Escape')      closeLb();
        if (e.key === 'ArrowRight')  nav(-1);
        if (e.key === 'ArrowLeft')   nav(1);
      });

      let ts = 0;
      document.getElementById('lightbox').addEventListener('touchstart', e => ts = e.touches[0].clientX);
      document.getElementById('lightbox').addEventListener('touchend', e => {
        const diff = ts - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) nav(diff > 0 ? 1 : -1);
      });
    </script>
  </body>
</html>
